name: CI

# Runs on pushes to every branch EXCEPT main, and on pull requests
# targeting main. Direct pushes to main don't re-run the pipeline —
# code only lands there through a PR that already passed it.
on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: momosim

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: momosim/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm test

      - name: Upload coverage report
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: momosim/coverage/
          retention-days: 7

  dependency-scan:
    name: Dependency scan (npm audit)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: momosim

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      # Visibility: print every advisory (all severities). Never blocks the
      # build — this step is purely so findings are readable in the PR logs.
      - name: Audit report (all severities, non-blocking)
        run: npm audit
        continue-on-error: true

      # Gate: fail the pipeline on High or Critical advisories only.
      # Moderate/low are surfaced above but don't block the team. The one
      # known finding (js-yaml, moderate) is a transitive devDependency that
      # is absent from the production image — tracked in SECURITY.md.
      - name: Audit gate (fail on high or critical)
        run: npm audit --audit-level=high

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t momosim:ci ./momosim

      # Scan the image we just built (still only in the local Docker daemon,
      # not a registry) for known OS/library CVEs. Pinned to a fixed action
      # version for reproducibility.
      #   severity        -> focus the report on CRITICAL/HIGH only
      #   ignore-unfixed  -> only surface CVEs that actually have a fix
      #   exit-code 0     -> REPORT, don't block. Every finding this scan
      #                      produces lives in the node:20-alpine base image
      #                      (OS packages + npm's bundled tooling), never in
      #                      our own app layers, and no patched base image is
      #                      available yet. Hard-failing on base-image CVEs we
      #                      cannot remediate would permanently block the whole
      #                      team's merges, so the scan runs on every PR and
      #                      surfaces findings for review / SECURITY.md while
      #                      exiting 0. Our own dependencies are gated hard in
      #                      the separate dependency-scan job (npm audit).
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: momosim:ci
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Smoke-test the image
        run: |
          docker run -d --rm --name momosim-ci -p 3000:3000 momosim:ci
          sleep 3
          curl --fail http://localhost:3000/api/accounts
          docker stop momosim-ci

  iac-scan:
    name: IaC scan (Checkov)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Static-analyse the Terraform in terraform/ for insecure infrastructure
      # settings (open ingress, unencrypted volumes, missing logging, etc.).
      #   directory/framework -> scan only our Terraform, nothing else
      #   quiet               -> print only the checks that FAILED
      #   soft_fail: true     -> REPORT, don't block. The Terraform is owned by
      #                          the infrastructure workstream; this scan
      #                          surfaces findings on every PR for review and
      #                          for SECURITY.md, without blocking the team's
      #                          merges. Findings are triaged with the infra
      #                          owner and either fixed there or accepted with
      #                          a documented rationale.
      - name: Run Checkov against terraform/
        uses: bridgecrewio/checkov-action@v12.3114.0
        with:
          directory: terraform/
          framework: terraform
          quiet: true
          soft_fail: true
          output_format: cli
